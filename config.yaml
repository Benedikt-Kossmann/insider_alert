scoring:
  alert_threshold: 60
  weights:
    price_anomaly: 0.15
    volume_anomaly: 0.15
    orderflow_anomaly: 0.10
    options_anomaly: 0.20
    insider_signal: 0.20
    event_leadup: 0.10
    news_divergence: 0.05
